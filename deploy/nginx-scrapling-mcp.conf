# ============================================================
# Scrapling MCP Server - Nginx 反向代理配置
# 适用于 1Panel 面板的 OpenResty
# ============================================================
#
# 功能：
#   1. HTTPS/SSL 终结（证书由 1Panel Let's Encrypt 管理）
#   2. Bearer Token 身份验证
#   3. 速率限制（防止滥用）
#   4. SSE/长连接支持（MCP streamable-http 需要）
#
# 使用方式：
#   将此文件的核心配置复制到 1Panel 的网站反向代理配置中
#   或手动放置到 /usr/local/openresty/nginx/conf/conf.d/ 目录下
#
# 注意：你需要将下列占位符替换为实际值：
#   - __MCP_DOMAIN__      → 你的域名（如 mcp.yourdomain.com）
#   - __MCP_AUTH_TOKEN__   → 你的 Bearer Token
#   - __SSL_CERT_PATH__   → SSL 证书路径（1Panel 自动管理）
#   - __SSL_KEY_PATH__    → SSL 私钥路径（1Panel 自动管理）
# ============================================================

# 速率限制区域定义（放在 http 块中，或在 1Panel → OpenResty → 配置 中添加）
# limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=10r/s;

server {
    listen 80;
    server_name __MCP_DOMAIN__;

    # HTTP → HTTPS 重定向
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name __MCP_DOMAIN__;

    # ---- SSL 证书（由 1Panel Let's Encrypt 自动管理）----
    ssl_certificate     __SSL_CERT_PATH__;
    ssl_certificate_key __SSL_KEY_PATH__;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- 安全响应头 ----
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- 请求体限制 ----
    client_max_body_size 10m;

    # ---- 速率限制 ----
    # limit_req zone=mcp_limit burst=20 nodelay;

    # ---- 健康检查端点（无需认证）----
    location = /health {
        proxy_pass http://127.0.0.1:8000/mcp/;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---- MCP Server 主路由 ----
    location /mcp/ {
        # ======== Bearer Token 身份验证 ========
        # 检查 Authorization 头
        set $auth_ok 0;

        if ($http_authorization = "Bearer __MCP_AUTH_TOKEN__") {
            set $auth_ok 1;
        }

        if ($auth_ok = 0) {
            return 401 '{"error": "Unauthorized: Invalid or missing Bearer token"}';
        }

        # ======== 反向代理到 Scrapling MCP Server ========
        proxy_pass http://127.0.0.1:8000/mcp/;

        # 基本代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ======== SSE / 长连接支持 ========
        # MCP streamable-http 使用 SSE 进行响应流式传输
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;

        # 超时设置（爬取可能需要较长时间）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;

        # SSE 特定设置
        chunked_transfer_encoding on;
        tcp_nodelay on;
        tcp_nopush off;
    }

    # ---- 禁止访问其他路径 ----
    location / {
        return 404 '{"error": "Not Found"}';
    }
}
